<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Trade Opportunities</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
}

.card{
background:#1e293b;
border:none;
}

pre{
white-space:pre-wrap;
color:white;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow p-4">

<h2 class="text-center mb-3">AI Trade Opportunities</h2>

<p class="text-center text-secondary">
Analyze industry sectors using AI
</p>

<div class="input-group mb-3">

<input
id="sector"
type="text"
class="form-control"
placeholder="Example: technology, healthcare, finance"
/>

<button
class="btn btn-primary"
onclick="analyze()"
>
Analyze
</button>

</div>

<div id="loading" class="text-center mt-3" style="display:none">

<div class="spinner-border text-primary"></div>

<p class="mt-2">Generating AI analysis...</p>

</div>

<div id="result" class="mt-4"></div>

</div>

</div>

</div>

</div>

<script>

const API_BASE = "https://appscrip-jfc8.onrender.com"

async function analyze(){

const sector = document.getElementById("sector").value

const resultBox = document.getElementById("result")

const loading = document.getElementById("loading")

resultBox.innerHTML=""
loading.style.display="block"

try{

// Get guest token
const tokenResponse = await fetch(`${API_BASE}/guest`)

const tokenData = await tokenResponse.json()

const token = tokenData.access_token


// Call analysis endpoint
const response = await fetch(`${API_BASE}/analyze/${sector}`,{
headers:{
"Authorization":`Bearer ${token}`
}
})

const data = await response.json()

loading.style.display="none"

resultBox.innerHTML = `
<div class="card p-3">
<h4>Market Analysis</h4>
<pre>${data.report_markdown}</pre>
</div>
`

}catch(error){

loading.style.display="none"

resultBox.innerHTML = `
<div class="alert alert-danger">
Error generating analysis
</div>
`

console.error(error)

}

}

</script>

</body>

</html>
