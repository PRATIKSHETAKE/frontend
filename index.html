<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Electricity Bill Extractor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .header-title {
            font-weight: 600;
            color: #f1f5f9;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
        }

        .main-card {
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .upload-box {
            border: 2px dashed rgba(148, 163, 184, 0.3);
            border-radius: 14px;
            padding: 18px;
            background: rgba(15, 23, 42, 0.5);
        }

        .upload-box:hover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.08);
        }

        .form-control {
            background-color: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #e2e8f0;
        }

        .btn-custom {
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
        }

        .btn-custom:hover {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        .result-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .key {
            color: #cbd5f5;
        }

        .value {
            color: #22d3ee;
        }

        .success {
            color: #22c55e;
            font-weight: 500;
        }

        .failed {
            color: #ef4444;
            font-weight: 500;
        }

        .table-dark {
            --bs-table-bg: transparent;
            --bs-table-hover-bg: rgba(99,102,241,0.1);
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h2 class="header-title">⚡ Electricity Bill Extractor</h2>
        <p class="subtitle">Upload bills and extract structured data instantly</p>
    </div>

    <!-- UPLOAD -->
    <div class="card main-card p-4 shadow-sm">

        <div class="mb-3 upload-box">
            <label class="form-label">📄 Upload Bill(s)</label>
            <input type="file" class="form-control" id="fileInput" multiple>
        </div>

        <div class="mb-3 upload-box">
            <label class="form-label">📁 OR Select Folder</label>
            <input type="file" class="form-control" id="folderInput" multiple webkitdirectory directory>
        </div>

        <button class="btn btn-custom w-100" onclick="upload()">🚀 Extract Data</button>
    </div>

    <!-- RESULTS -->
    <div id="resultBox" class="mt-4"></div>

</div>

<script>
const BASE_URL = "https://bill-extractor-ve47.onrender.com";

async function upload() {
    const fileInput = document.getElementById("fileInput");
    const folderInput = document.getElementById("folderInput");
    const resultBox = document.getElementById("resultBox");

    let formData = new FormData();

    if (folderInput.files.length > 0) {
        resultBox.innerHTML = "⏳ Processing folder... (Server may take time to wake up)";
        for (let file of folderInput.files) {
            formData.append("files", file);
        }
    } else if (fileInput.files.length > 0) {
        resultBox.innerHTML = "⏳ Processing files...";
        for (let file of fileInput.files) {
            formData.append("files", file);
        }
    } else {
        resultBox.innerHTML = "❌ Please select files.";
        return;
    }

    try {
        const response = await fetch(`${BASE_URL}/extract-bill`, {
            method: "POST",
            body: formData
        });

        if (!response.ok) throw new Error("Server error");

        const data = await response.json();
        resultBox.innerHTML = formatResult(data);

    } catch (err) {
        resultBox.innerHTML = "❌ Backend error or server sleeping (wait 30 sec)";
    }
}

function downloadCSV(path) {
    const url = `${BASE_URL}/${path}`;
    const a = document.createElement("a");
    a.href = url;
    a.download = "bill_data.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function formatResult(response) {
    let html = `
        <div class="result-card p-3 mb-3">
            <h6>📊 Summary</h6>
            <div class="d-flex justify-content-between">
                <span class="key">Status</span>
                <span class="${response.status === 'completed' ? 'success' : 'failed'}">
                    ${response.status}
                </span>
            </div>
            <div class="d-flex justify-content-between">
                <span class="key">Total Files</span>
                <span class="value">${response.total_files}</span>
            </div>

            <div class="text-center mt-3">
                <button class="btn btn-custom"
                    onclick="downloadCSV('${response.csv_file}')">
                    📥 Download CSV
                </button>
            </div>
        </div>

        <div class="result-card p-3">
            <h6>📄 Extracted Bills</h6>
            <div class="table-responsive">
                <table class="table table-dark table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>File</th>
                            <th>Status</th>
                            <th>Consumer ID</th>
                            <th>Name</th>
                            <th>Billing Date</th>
                            <th>Units</th>
                            <th>Amount</th>
                            <th>Due Date</th>
                        </tr>
                    </thead>
                    <tbody>
    `;

    response.results.forEach((item, i) => {
        const d = item.data || {};
        html += `
            <tr>
                <td>${i + 1}</td>
                <td>${item.file}</td>
                <td class="${item.status === 'success' ? 'success' : 'failed'}">${item.status}</td>
                <td>${d.consumer_id || '-'}</td>
                <td>${d.name || '-'}</td>
                <td>${d.billing_date || '-'}</td>
                <td>${d.units || '-'}</td>
                <td>${d.amount || '-'}</td>
                <td>${d.due_date || '-'}</td>
            </tr>
        `;
    });

    html += `</tbody></table></div></div>`;
    return html;
}
</script>

</body>
</html>
