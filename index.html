<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Electricity Bill Extractor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1e293b, #020617);
    min-height: 100vh;
    color: #e2e8f0;
}

/* HEADER */
.header-title {
    font-weight: 600;
    font-size: 32px;
    background: linear-gradient(90deg, #6366f1, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: #cbd5f5;
    font-size: 15px;
}

/* CARD */
.main-card {
    border-radius: 20px;
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
}

/* UPLOAD BOX */
.upload-box {
    border: 2px dashed rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 18px;
    background: rgba(15, 23, 42, 0.6);
    transition: all 0.3s ease;
}

.upload-box:hover {
    border-color: #6366f1;
    background: rgba(99, 102, 241, 0.1);
    transform: scale(1.01);
}

/* LABEL FIX (IMPORTANT) */
.form-label {
    color: #f1f5f9 !important;
    font-weight: 500;
    margin-bottom: 6px;
}

/* INPUT */
.form-control {
    background-color: rgba(30, 41, 59, 0.8);
    border: 1px solid rgba(255,255,255,0.1);
    color: #e2e8f0;
}

.form-control::file-selector-button {
    background: #0f172a;
    color: #e2e8f0;
    border: none;
}

/* BUTTON */
.btn-custom {
    background: linear-gradient(135deg, #6366f1, #22d3ee);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
    font-weight: 500;
    transition: all 0.3s ease;
}

.btn-custom:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
}

/* RESULT CARD */
.result-card {
    background: rgba(30, 41, 59, 0.7);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 20px rgba(34, 211, 238, 0.1);
}

/* TEXT COLORS */
.key {
    color: #cbd5f5;
}

.value {
    color: #22d3ee;
}

.success {
    color: #22c55e;
    font-weight: 500;
}

.failed {
    color: #ef4444;
    font-weight: 500;
}

/* TABLE */
.table-dark {
    --bs-table-bg: transparent;
    --bs-table-hover-bg: rgba(99,102,241,0.15);
}

.table th {
    color: #a5b4fc;
}

.table td {
    color: #e2e8f0;
}

/* GLOW EFFECT */
.glow {
    text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
}
</style>
</head>

<body>

<div class="container mt-5">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h2 class="header-title glow">⚡ Electricity Bill Extractor</h2>
        <p class="subtitle">Upload bills and extract structured data instantly</p>
    </div>

    <!-- CARD -->
    <div class="card main-card p-4">

        <div class="mb-3 upload-box">
            <label class="form-label">📄 Upload Bill Files</label>
            <input type="file" class="form-control" id="fileInput" multiple>
        </div>

        <div class="mb-3 upload-box">
            <label class="form-label">📁 Select Folder (Bulk Upload)</label>
            <input type="file" class="form-control" id="folderInput" multiple webkitdirectory directory>
        </div>

        <button class="btn btn-custom w-100" onclick="upload()">🚀 Extract Data</button>
    </div>

    <div id="resultBox" class="mt-4"></div>
</div>

<script>
const BASE_URL = "https://bill-extractor-ve47.onrender.com";

async function upload() {
    const fileInput = document.getElementById("fileInput");
    const folderInput = document.getElementById("folderInput");
    const resultBox = document.getElementById("resultBox");

    let formData = new FormData();

    if (folderInput.files.length > 0) {
        resultBox.innerHTML = "⏳ Processing folder...";
        for (let file of folderInput.files) {
            formData.append("files", file);
        }
    } else if (fileInput.files.length > 0) {
        resultBox.innerHTML = "⏳ Processing files...";
        for (let file of fileInput.files) {
            formData.append("files", file);
        }
    } else {
        resultBox.innerHTML = "❌ Please select files.";
        return;
    }

    try {
        const response = await fetch(`${BASE_URL}/extract-bill`, {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        resultBox.innerHTML = formatResult(data);

    } catch (err) {
        resultBox.innerHTML = "❌ Backend error";
    }
}

function downloadCSV(path) {
    const a = document.createElement("a");
    a.href = `${BASE_URL}/${path}`;
    a.download = "bill_data.csv";
    a.click();
}

function formatResult(response) {
    let html = `
        <div class="result-card p-3 mb-3">
            <h6 class="glow">📊 Summary</h6>
            <div class="d-flex justify-content-between">
                <span class="key">Status</span>
                <span class="${response.status === 'completed' ? 'success' : 'failed'}">
                    ${response.status}
                </span>
            </div>
            <div class="d-flex justify-content-between">
                <span class="key">Total Files</span>
                <span class="value">${response.total_files}</span>
            </div>

            <div class="text-center mt-3">
                <button class="btn btn-custom"
                    onclick="downloadCSV('${response.csv_file}')">
                    📥 Download CSV
                </button>
            </div>
        </div>
    `;
    return html;
}
</script>

</body>
</html>
